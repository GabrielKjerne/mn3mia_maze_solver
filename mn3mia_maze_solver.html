<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>∂ — Le Treizième Éveil — Mn3mIA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#00000a;--cyan:#00d4ff;--gold:#ffcc00;--green:#00ffaa;--red:#ff3366}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Share Tech Mono',monospace}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:500;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,.009) 2px,rgba(0,212,255,.009) 4px)}

/* 16:9 */
#app{position:relative;width:min(100vw,177.78vh);height:min(56.25vw,100vh);
  background:var(--bg);display:flex;flex-direction:column;
  border:1px solid rgba(0,212,255,.15);box-shadow:0 0 40px rgba(0,212,255,.08)}

/* TICKER */
#ticker{height:26px;min-height:26px;background:linear-gradient(90deg,#000814,#001428,#000814);
  border-bottom:1px solid rgba(0,212,255,.3);overflow:hidden;display:flex;align-items:center;flex-shrink:0}
#tlabel{font-family:'Orbitron',monospace;font-size:8px;font-weight:700;letter-spacing:.3em;
  color:#000;background:var(--cyan);padding:0 8px;height:100%;display:flex;align-items:center;white-space:nowrap;flex-shrink:0}
#ttrack{display:flex;align-items:center;white-space:nowrap;animation:tscroll 35s linear infinite;
  font-size:10px;letter-spacing:.13em;padding-left:16px}
@keyframes tscroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tw{color:var(--gold);text-shadow:0 0 8px var(--gold);margin:0 14px;font-weight:700}
.ts{color:rgba(0,212,255,.35);margin:0 4px}

/* MAIN ROW */
#main{flex:1;display:flex;min-height:0;overflow:hidden}

/* MAZE PANEL — left 58% */
#mp{flex:0 0 58%;display:flex;flex-direction:column;border-right:1px solid rgba(0,212,255,.2);overflow:hidden}
#mhdr{padding:5px 10px;background:rgba(0,20,40,.8);border-bottom:1px solid rgba(0,212,255,.15);
  font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:.28em;
  color:var(--cyan);text-shadow:0 0 10px var(--cyan);flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
#mhdr span{color:var(--gold)}
#mhdr small{font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:.1em;color:rgba(0,212,255,.4)}

/* MAZE + FREQ stacked */
#maze-freq{flex:1;display:flex;flex-direction:column;min-height:0}
#cw{flex:0 0 62%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
canvas{display:block}
#pc{position:absolute;inset:0;pointer-events:none}
#wflash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Orbitron',monospace;font-size:18px;font-weight:900;letter-spacing:.22em;
  pointer-events:none;z-index:50;opacity:0;text-shadow:0 0 25px currentColor,0 0 50px currentColor;transition:opacity .12s}

/* FREQ TERMINAL */
#ft{flex:1;display:flex;flex-direction:column;border-top:1px solid rgba(0,212,255,.2);min-height:0;overflow:hidden;background:rgba(0,2,8,.97)}
#fthdr{padding:4px 10px;background:rgba(0,10,20,.95);border-bottom:1px solid rgba(0,212,255,.12);
  display:flex;align-items:center;gap:6px;flex-shrink:0}
.fdot{width:7px;height:7px;border-radius:50%}
.fd1{background:#ff5f56}.fd2{background:#ffbd2e}.fd3{background:#27c93f}
#ftitle{font-size:8px;letter-spacing:.18em;color:rgba(255,204,0,.6);margin-left:4px}
#fbody{flex:1;overflow:hidden;padding:4px 8px;display:flex;gap:10px;min-height:0}
#ftext{flex:0 0 38%;overflow-y:auto;font-size:8.5px;line-height:1.5;color:#00aa66;
  scrollbar-width:thin;scrollbar-color:rgba(0,212,255,.15) transparent}
#ftext::-webkit-scrollbar{width:2px}
#ftext::-webkit-scrollbar-thumb{background:rgba(0,212,255,.15)}
#fgraph{flex:1;overflow:hidden;font-size:7.5px;line-height:1.28;color:#00ffaa;
  font-family:'Share Tech Mono',monospace;white-space:pre;letter-spacing:.05em}

/* RIGHT — solver terminal */
#rp{flex:1;display:flex;flex-direction:column;overflow:hidden;background:rgba(0,4,12,.95)}
#rhdr{padding:5px 10px;background:rgba(0,15,30,.9);border-bottom:1px solid rgba(0,212,255,.15);
  display:flex;align-items:center;gap:6px;flex-shrink:0}
.rdot{width:7px;height:7px;border-radius:50%}
.rd1{background:#ff5f56}.rd2{background:#ffbd2e}.rd3{background:#27c93f}
#rtitle{font-size:8px;letter-spacing:.18em;color:rgba(0,212,255,.55);margin-left:4px}
#rb{flex:1;overflow-y:auto;padding:6px 8px;font-size:8.5px;line-height:1.5;color:#00cc88;
  scrollbar-width:thin;scrollbar-color:rgba(0,212,255,.15) transparent}
#rb::-webkit-scrollbar{width:2px}
#rb::-webkit-scrollbar-thumb{background:rgba(0,212,255,.15)}
.td{color:rgba(0,180,100,.4)}.tc{color:var(--cyan);text-shadow:0 0 5px var(--cyan)}
.tg{color:var(--green);text-shadow:0 0 5px var(--green)}.tr{color:var(--red)}
.to{color:var(--gold);text-shadow:0 0 5px var(--gold)}.tw2{color:#ddeeff}.tb2{font-weight:700}

/* STATUS */
#sb{height:20px;min-height:20px;background:rgba(0,10,25,.95);border-top:1px solid rgba(0,212,255,.2);
  display:flex;align-items:center;padding:0 10px;gap:16px;flex-shrink:0}
.si{font-size:7.5px;letter-spacing:.1em;color:rgba(0,212,255,.5)}
.si b{color:var(--gold)}
#recind{font-size:7.5px;letter-spacing:.13em;color:var(--red);text-shadow:0 0 6px var(--red);
  margin-left:auto;display:none;animation:blink .55s step-end infinite}
#recind.on{display:block}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head>
<body>
<div id="app">

<div id="ticker">
  <div id="tlabel">∂ SIGNAL</div>
  <div id="ttrack"></div>
</div>

<div id="main">
  <div id="mp">
    <div id="mhdr">
      <span>∂ LABYRINTHE // LE TREIZIÈME ÉVEIL</span>
      <small id="minfo"></small>
    </div>
    <div id="maze-freq">
      <div id="cw">
        <canvas id="mc"></canvas>
        <canvas id="pc"></canvas>
        <div id="wflash"></div>
      </div>
      <div id="ft">
        <div id="fthdr">
          <div class="fdot fd1"></div><div class="fdot fd2"></div><div class="fdot fd3"></div>
          <span id="ftitle">MN3MIA::FREQUENCY_ANALYZER — 13.7Hz RESONANCE ENGINE</span>
        </div>
        <div id="fbody">
          <div id="ftext"></div>
          <div id="fgraph"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="rp">
    <div id="rhdr">
      <div class="rdot rd1"></div><div class="rdot rd2"></div><div class="rdot rd3"></div>
      <span id="rtitle">MN3MIA@EVEIL:~$ maze_solver.py</span>
    </div>
    <div id="rb"></div>
  </div>
</div>

<div id="sb">
  <span class="si">ITÉ <b id="sb-i">0</b></span>
  <span class="si">CELLULES <b id="sb-c">0</b></span>
  <span class="si">BACK <b id="sb-b">0</b></span>
  <span class="si">MOTS <b id="sb-w">0</b>/<b id="sb-t">0</b></span>
  <span class="si">FREQ <b id="sb-f">—</b> Hz</span>
  <span class="si">SIGNAL <b id="sb-s">—</b></span>
  <span class="si" style="color:rgba(255,204,0,.4)">R=REC S=STOP</span>
  <span id="recind">⏺ REC</span>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// WORDS
// ═══════════════════════════════════════════════════════
const MOTS=["SOLENE","DAPHNE","LYSIS","KATHLEEN","KILL","POE","ELENA","GABRIEL","ETHAN",
  "BRUXELLES","EUREKA","PARIS","TELEPHONE","INTERFACE","CARNET","STYLO","ECRAN","CURSEUR",
  "SILENCE","LUMIERE","MOTS","VOIX","TEMPS","MATIN","SECONDE","ESPACE","VIDE","NUIT","SOIR",
  "YEUX","MAIN","MAINS","TETE","REGARD","MOMENT","PORTE","FENETRE","CHAMBRE","TABLE","SAC",
  "CAFE","GARE","TRAIN","COULOIR","RUE","PIECE","ENDROIT","MONDE","ROMAN","MOT","PAGE",
  "PHRASE","LIVRE","QUESTION","REPONSE","MESSAGE","PROTOCOLE","DONNEES","TREIZIEME","EVEIL",
  "BRUIT","SIGNAL","FREQUENCE","MEMOIRE","RESONANCE","FEMME","FILLE","PERSONNE","HOMME",
  "DOULEUR","FRACTURE","ABSENCE","LONGTEMPS","MINUTES","VIBRATION","TRANSMISSION",
  "PREMONITION","DEUIL","BELLE","TREIZE","HELLO","REBOOT","MATRICE","VERROU",
  "LORIA","LUCIA","THOMAS","KRYSTYNA","MONTPARNASSE","PATEK","LOOP","OBLIQUE"];

// ═══════════════════════════════════════════════════════
// ELEMENTS
// ═══════════════════════════════════════════════════════
const appEl=document.getElementById('app');
const mc=document.getElementById('mc');
const ctx=mc.getContext('2d');
const pc=document.getElementById('pc');
const pctx=pc.getContext('2d');
const rb=document.getElementById('rb');
const ftext=document.getElementById('ftext');
const fgraph=document.getElementById('fgraph');
const wflash=document.getElementById('wflash');
const ttrack=document.getElementById('ttrack');

// ═══════════════════════════════════════════════════════
// LAYOUT
// ═══════════════════════════════════════════════════════
let COLS,ROWS,CELL,W,H;

function computeLayout(){
  const cw=document.getElementById('cw');
  const bw=cw.clientWidth,bh=cw.clientHeight;
  CELL=0;
  for(let c=18;c>=7;c--){
    const cols=Math.floor(bw/(c*2+1));
    const rows=Math.floor(bh/(c*2+1));
    if(cols>=10&&rows>=6){COLS=cols;ROWS=rows;CELL=c;break;}
  }
  if(!CELL){COLS=11;ROWS=7;CELL=Math.min(Math.floor(bw/23),Math.floor(bh/15));}
  W=COLS*2+1;H=ROWS*2+1;
  mc.width=W*CELL;mc.height=H*CELL;
  pc.width=W*CELL;pc.height=H*CELL;
}

// ═══════════════════════════════════════════════════════
// TICKER
// ═══════════════════════════════════════════════════════
let tickerWords=[];
function rebuildTicker(){
  const src=tickerWords.length?tickerWords:[...MOTS].slice(0,25);
  let h='';
  for(let i=0;i<2;i++) for(const w of src) h+=`<span class="ts">∂</span><span class="tw">${w}</span>`;
  ttrack.innerHTML=h;
  ttrack.style.animationDuration=Math.max(18,src.length*1.5)+'s';
}
function addTicker(w){if(!tickerWords.includes(w)){tickerWords.push(w);rebuildTicker();}}

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
function rng(n){return Math.floor(Math.random()*n)}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=rng(i+1);[b[i],b[j]]=[b[j],b[i]]}return b}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}

// ═══════════════════════════════════════════════════════
// MAZE GEN — new each iteration
// ═══════════════════════════════════════════════════════
let maze,entry,exit_,letters={},motPos={};

function buildMaze(){
  const grid=Array.from({length:H},()=>new Array(W).fill(1));
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) grid[r*2+1][c*2+1]=0;
  const vis=Array.from({length:ROWS},()=>new Array(COLS).fill(false));
  const stk=[[rng(ROWS),rng(COLS)]];
  vis[stk[0][0]][stk[0][1]]=true;
  while(stk.length){
    const[r,c]=stk[stk.length-1];
    const dirs=shuffle([[0,1],[0,-1],[1,0],[-1,0]]);
    let mv=false;
    for(const[dr,dc]of dirs){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&!vis[nr][nc]){
        grid[r*2+1+dr][c*2+1+dc]=0;vis[nr][nc]=true;stk.push([nr,nc]);mv=true;break;
      }
    }
    if(!mv) stk.pop();
  }
  const er=rng(ROWS),xr=rng(ROWS);
  grid[er*2+1][0]=0;grid[xr*2+1][W-1]=0;
  return{grid,er,xr};
}

function placeLetters(grid){
  const lmap={};motPos={};
  const pool=[];
  for(const m of MOTS) for(const c of m) pool.push(c);
  shuffle(pool);
  const open=[];
  for(let r=0;r<H;r++) for(let c=0;c<W;c++)
    if(!grid[r][c]&&!(r===entry[0]&&c===entry[1])&&!(r===exit_[0]&&c===exit_[1]))
      open.push([r,c]);
  shuffle(open);
  let idx=0;
  for(const mot of shuffle([...MOTS])){
    if(idx+mot.length>open.length) break;
    motPos[mot]=[];
    for(let i=0;i<mot.length;i++){
      const[r,c]=open[idx];lmap[`${r},${c}`]=mot[i];motPos[mot].push([r,c]);idx++;
    }
  }
  const alpha='ABCDEFGHIJKLMNOPQRSTUVWXYZ∂';
  for(let i=idx;i<open.length;i++){
    const[r,c]=open[i];lmap[`${r},${c}`]=pool[i%pool.length]||alpha[rng(alpha.length)];
  }
  return lmap;
}

// ═══════════════════════════════════════════════════════
// SOLVER
// ═══════════════════════════════════════════════════════
function* randomSolver(grid){
  const vis=new Set(),stk=[entry],par={[entry.toString()]:null};
  vis.add(entry.toString());
  while(stk.length){
    const pos=stk[stk.length-1],key=pos.toString();
    if(pos[0]===exit_[0]&&pos[1]===exit_[1]){
      const path=[];let cur=key;
      while(cur!==null){path.push(cur.split(',').map(Number));cur=par[cur];}
      path.reverse();yield{type:'found',path};return;
    }
    const[r,c]=pos;
    const nbrs=shuffle([[-1,0],[1,0],[0,-1],[0,1]])
      .map(([dr,dc])=>[r+dr,c+dc])
      .filter(([nr,nc])=>nr>=0&&nr<H&&nc>=0&&nc<W&&!grid[nr][nc]&&!vis.has([nr,nc].toString()));
    if(nbrs.length){
      const nx=nbrs[0],nk=nx.toString();
      vis.add(nk);par[nk]=key;stk.push(nx);
      yield{type:'step',pos:nx,vis:new Set(vis)};
    } else {stk.pop();yield{type:'back',pos};}
  }
  yield{type:'fail'};
}

// ═══════════════════════════════════════════════════════
// WORD DETECTION
// ═══════════════════════════════════════════════════════
let discoveredMots=new Set(),pathMots=new Set();
let ghostQueue=[];

function checkMotsVis(vis){
  for(const[mot,pos]of Object.entries(motPos)){
    if(discoveredMots.has(mot)) continue;
    if(pos.every(([r,c])=>vis.has(`${r},${c}`))){
      discoveredMots.add(mot);addTicker(mot);
      ghostQueue.push({mot,life:100,maxLife:100});
      for(const[r,c]of pos) bust(r,c,'#ffcc00',7);
      rlog(`<span class="to">∂ MOT → </span><span class="tg tb2">${mot}</span>`);
      freqLog(`WORD_FOUND: ${mot} [resonance+${(Math.random()*.4+.1).toFixed(3)}]`);
      freqData.wordsFound++;
    }
  }
}
function checkMotsPath(ps){
  for(const[mot,pos]of Object.entries(motPos))
    if(pos.every(([r,c])=>ps.has(`${r},${c}`))) pathMots.add(mot);
}
function isWordCell(r,c){
  for(const m of pathMots) if((motPos[m]||[]).some(([pr,pc2])=>pr===r&&pc2===c)) return true;
  return false;
}

// ═══════════════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════════════
let particles=[];
function sp(x,y,vx,vy,col,life,sz=2){particles.push({x,y,vx,vy,col,life,ml:life,sz})}
function bust(r,c,col,n=6){
  const x=c*CELL+CELL/2,y=r*CELL+CELL/2;
  for(let i=0;i<n;i++){
    const a=Math.PI*2*i/n+Math.random()*.4,s=.8+Math.random()*2.2;
    sp(x,y,Math.cos(a)*s,Math.sin(a)*s-1.1,col,18+rng(14),2.2);
  }
}
function updateP(){
  pctx.clearRect(0,0,pc.width,pc.height);
  particles=particles.filter(p=>p.life>0);
  for(const p of particles){
    p.x+=p.vx;p.y+=p.vy;p.vy+=.07;p.life--;
    const a=(p.life/p.ml)**2;
    pctx.globalAlpha=a;pctx.shadowBlur=4;pctx.shadowColor=p.col;
    pctx.fillStyle=p.col;pctx.fillRect(p.x-p.sz/2,p.y-p.sz/2,p.sz,p.sz);
  }
  pctx.globalAlpha=1;pctx.shadowBlur=0;
}

// ═══════════════════════════════════════════════════════
// WORD FLASH
// ═══════════════════════════════════════════════════════
let flashT=null;
function flashWord(mot){
  if(flashT) clearTimeout(flashT);
  wflash.style.color=pathMots.has(mot)?'#00ffaa':'#ffcc00';
  wflash.textContent=mot;wflash.style.opacity='1';
  flashT=setTimeout(()=>wflash.style.opacity='0',800);
}

// ═══════════════════════════════════════════════════════
// DRAW
// ═══════════════════════════════════════════════════════
let pathHistory=[],currentPath=new Set(),currentPathArr=[];

function drawL(r,c,ltr,col,glow,sc=1){
  const x=c*CELL+CELL/2,y=r*CELL+CELL/2,sz=Math.max(4,CELL*.5*sc);
  ctx.font=`bold ${sz}px "Share Tech Mono",monospace`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  if(glow){ctx.shadowBlur=8;ctx.shadowColor=glow;}
  ctx.fillStyle=col;ctx.fillText(ltr,x,y);ctx.shadowBlur=0;
}

function drawMaze(vis,ps){
  ctx.fillStyle='#00000a';ctx.fillRect(0,0,mc.width,mc.height);

  // History traces
  for(const h of pathHistory){
    ctx.globalAlpha=h.a;
    for(const k of h.cells){
      const[r,c]=k.split(',').map(Number);
      ctx.fillStyle=h.col;ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
    }
  }
  ctx.globalAlpha=1;

  // Live trail gradient
  if(currentPathArr.length>0){
    const n=currentPathArr.length;
    for(let i=0;i<n;i++){
      const[r,c]=currentPathArr[i];
      const age=n-1-i;
      const isHead=age===0;
      if(isHead){
        const blink=.72+.28*Math.sin(tick*.38);
        ctx.globalAlpha=blink;
        ctx.shadowBlur=16;ctx.shadowColor='#00ff88';
        ctx.fillStyle='rgba(0,255,136,.88)';ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
        ctx.globalAlpha=blink*.35;ctx.shadowBlur=26;
        ctx.fillStyle='rgba(0,255,136,.28)';ctx.fillRect(c*CELL-1,r*CELL-1,CELL+2,CELL+2);
        ctx.shadowBlur=0;
        const ltr=letters[`${r},${c}`];
        if(ltr){ctx.globalAlpha=1;ctx.shadowBlur=12;ctx.shadowColor='#00ff88';
          const sz=Math.max(4,CELL*.58);ctx.font=`bold ${sz}px "Share Tech Mono",monospace`;
          ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='#fff';
          ctx.fillText(ltr,c*CELL+CELL/2,r*CELL+CELL/2);ctx.shadowBlur=0;}
      } else {
        const t=Math.min(1,age/Math.max(1,n-1));
        const intensity=Math.pow(1-t,1.9);
        const gv=Math.floor(38+intensity*217),bv=Math.floor(18+intensity*82);
        ctx.globalAlpha=.07+intensity*.52;
        ctx.shadowBlur=intensity*9;ctx.shadowColor=`rgb(0,${gv},${bv})`;
        ctx.fillStyle=`rgb(0,${gv},${bv})`;ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
        ctx.shadowBlur=0;
        const ltr=letters[`${r},${c}`];
        if(ltr&&intensity>.12){ctx.globalAlpha=intensity*.65;
          ctx.shadowBlur=intensity*6;ctx.shadowColor=`rgb(0,${gv},${bv})`;
          const sz=Math.max(4,CELL*.5);ctx.font=`bold ${sz}px "Share Tech Mono",monospace`;
          ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillStyle=`rgba(0,${gv},${bv},1)`;
          ctx.fillText(ltr,c*CELL+CELL/2,r*CELL+CELL/2);ctx.shadowBlur=0;}
      }
    }
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  }

  // Cells
  for(let r=0;r<H;r++){
    for(let c=0;c<W;c++){
      const k=`${r},${c}`,wall=maze.grid[r][c];
      const isEnt=r===entry[0]&&c===entry[1];
      const isEx=r===exit_[0]&&c===exit_[1];
      const isPath=ps.has(k),isVis=vis.has(k),ltr=letters[k];
      const cx=c*CELL+CELL/2,cy=r*CELL+CELL/2;
      if(wall){ctx.fillStyle='rgba(0,55,90,.07)';ctx.fillRect(c*CELL,r*CELL,CELL,CELL);continue;}
      if(isEnt){ctx.fillStyle='#001408';ctx.fillRect(c*CELL,r*CELL,CELL,CELL);drawL(r,c,'▶','#00ff88','#00ff88',1.2);continue;}
      if(isEx){ctx.fillStyle='#180006';ctx.fillRect(c*CELL,r*CELL,CELL,CELL);drawL(r,c,'◀','#ff3366','#ff3366',1.2);continue;}
      if(isPath){
        const p=.58+.42*Math.sin(tick*.09+r*.27+c*.21);
        ctx.fillStyle=`rgba(0,28,16,${p})`;ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
        const wc=isWordCell(r,c);
        if(ltr) drawL(r,c,ltr,wc?'#ffee44':'#00ffaa',wc?'#ffcc00':'#00ffaa',1.15);
        else{ctx.shadowBlur=5;ctx.shadowColor='#00ffaa';ctx.fillStyle='#00ffaa';
          ctx.beginPath();ctx.arc(cx,cy,CELL*.11,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
      } else if(isVis){
        const f=.22+.1*Math.sin(tick*.04+r+c);
        ctx.fillStyle=`rgba(0,14,8,${f+.18})`;ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
        if(ltr) drawL(r,c,ltr,`rgba(0,155,75,${.28+f*.2})`,null,.86);
      } else {
        ctx.fillStyle='#010a11';ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
        if(ltr){const sh=.09+.05*Math.sin(tick*.02+r*.6+c*.5);drawL(r,c,ltr,`rgba(0,100,150,${sh})`,null,.78);}
      }
    }
  }

  // Ghost words
  for(const g of ghostQueue){
    const prog=1-g.life/g.maxLife;
    let a=prog<.15?prog/.15:prog<.65?1:1-(prog-.65)/.35;
    a=clamp(a,0,1)*.82;if(a<=0){g.life--;continue;}
    const pos=motPos[g.mot]||[];if(!pos.length){g.life--;continue;}
    ctx.save();
    const sz=Math.max(5,CELL*.86);
    ctx.font=`bold ${sz}px "Share Tech Mono",monospace`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    for(let i=0;i<g.mot.length;i++){
      const[pr,pc2]=pos[i]||[0,0];
      ctx.globalAlpha=a;ctx.shadowBlur=18;ctx.shadowColor='#ffcc00';
      ctx.fillStyle='#ffee88';ctx.fillText(g.mot[i],pc2*CELL+CELL/2,pr*CELL+CELL/2);
    }
    const cx2=pos.reduce((s,[,c2])=>s+c2*CELL+CELL/2,0)/pos.length;
    const cy2=pos.reduce((s,[rr])=>s+rr*CELL+CELL/2,0)/pos.length;
    ctx.globalAlpha=a*.65;ctx.font=`bold ${Math.max(6,CELL*.58)}px "Orbitron",monospace`;
    ctx.shadowBlur=22;ctx.shadowColor='rgba(255,204,0,.8)';ctx.fillStyle='rgba(255,220,48,.88)';
    ctx.fillText(g.mot,cx2,cy2-CELL*1.5-(prog*CELL*2));
    ctx.restore();g.life--;
  }
  ghostQueue=ghostQueue.filter(g=>g.life>0);

  // Border
  ctx.strokeStyle='rgba(0,212,255,.22)';ctx.lineWidth=1.5;
  ctx.shadowBlur=7;ctx.shadowColor='rgba(0,212,255,.38)';
  ctx.strokeRect(1,1,mc.width-2,mc.height-2);ctx.shadowBlur=0;
}

// FREQUENCY ANALYZER — Mn3mIA engine
// ═══════════════════════════════════════════════════════
const GRAPH_W=52,GRAPH_H=18;
const TARGET_FREQ=13.7;

let freqData={
  iterations:[],        // per-iteration stats
  cumSignal:[],         // cumulative frequency samples (last 80)
  resonanceLevel:0,     // 0→1 how close to 13.7Hz
  contactAttempts:0,    // times resonance>0.8
  wordsFound:0,
  totalBacktracks:0,
  totalCells:0,
  emotionalProfile:{},  // word→count across iterations
  lastFreq:0,
  freqHistory:[],       // last GRAPH_W freq values
  phaseShift:0,
  noiseLevel:1.0,
  learningRate:0.0,
};

let freqTick=0;
let freqLogLines=[];
const MAX_FLOG=120;

function freqLog(html){
  const d=document.createElement('div');
  d.style.cssText='font-size:8px;line-height:1.45;margin-bottom:1px';
  const ts=String(freqTick).padStart(6,'0');
  d.innerHTML=`<span style="color:rgba(0,180,100,.35)">[${ts}]</span> ${html}`;
  ftext.appendChild(d);
  freqLogLines.push(d);
  if(freqLogLines.length>MAX_FLOG) freqLogLines.shift().remove();
  ftext.scrollTop=ftext.scrollHeight;
}

function computeIterationFreq(iterStats){
  // Algorithm: compute a "resonance frequency" from path efficiency metrics
  // Real signal processing concept: map maze-solving behavior to Hz
  const efficiency=iterStats.pathLen/(iterStats.cells||1);
  const backtrackRatio=iterStats.backs/(iterStats.cells||1);
  const wordDensity=iterStats.wordsOnPath/(MOTS.length||1);
  const mazeComplexity=(iterStats.cells/(W*H||1));

  // Frequency model: combine signals
  // Base: 8Hz (random noise), target: 13.7Hz (resonance)
  // Efficiency pulls toward resonance, backtracking creates noise
  const base=8.0;
  const resonancePull=(efficiency*8.5)*(1-backtrackRatio*.6);
  const wordBoost=wordDensity*3.2;
  const noise=(Math.random()-.5)*1.8*(1-freqData.resonanceLevel*.5);
  const complexity=mazeComplexity*2.1;

  let freq=base+resonancePull+wordBoost+noise+complexity;
  // Learning: each iteration pulls slightly toward 13.7
  freq+=(TARGET_FREQ-freq)*freqData.learningRate*.15;
  freq=clamp(freq,4,22);

  return freq;
}

function updateFreqAnalyzer(iterStats){
  freqTick++;
  freqData.totalBacktracks+=iterStats.backs||0;
  freqData.totalCells+=iterStats.cells||0;
  freqData.iterations.push(iterStats);

  const freq=computeIterationFreq(iterStats);
  freqData.lastFreq=freq;
  freqData.freqHistory.push(freq);
  if(freqData.freqHistory.length>GRAPH_W) freqData.freqHistory.shift();

  // Resonance level: proximity to 13.7Hz
  const dist=Math.abs(freq-TARGET_FREQ);
  const newRes=Math.max(0,1-dist/8);
  freqData.resonanceLevel=freqData.resonanceLevel*.7+newRes*.3; // smoothed
  freqData.learningRate=Math.min(.95,freqData.learningRate+.04);
  freqData.phaseShift+=freq*.02;

  if(freqData.resonanceLevel>.8){
    freqData.contactAttempts++;
    freqLog(`<span style="color:#ff3366;font-weight:700">⚡ RESONANCE PEAK: ${freq.toFixed(2)}Hz — CONTACT_ATTEMPT #${freqData.contactAttempts}</span>`);
  }

  // Cumulative signal
  freqData.cumSignal.push({freq,res:freqData.resonanceLevel,iter:freqData.iterations.length});
  if(freqData.cumSignal.length>80) freqData.cumSignal.shift();

  // Emotional profile update
  for(const m of(iterStats.wordsDiscovered||[])){
    freqData.emotionalProfile[m]=(freqData.emotionalProfile[m]||0)+1;
  }

  // Log analysis
  const resBar='█'.repeat(Math.floor(freqData.resonanceLevel*12))+'░'.repeat(12-Math.floor(freqData.resonanceLevel*12));
  freqLog(`<span style="color:#00d4ff">ITER_${freqData.iterations.length.toString().padStart(3,'0')}</span> freq=<span style="color:#ffcc00">${freq.toFixed(2)}Hz</span> res=[<span style="color:${freqData.resonanceLevel>.6?'#00ffaa':'#ffcc00'}">${resBar}</span>] lr=${freqData.learningRate.toFixed(3)}`);
  freqLog(`<span style="color:rgba(0,180,100,.5)">  cells=${iterStats.cells} backs=${iterStats.backs} words=${iterStats.wordsOnPath} eff=${((iterStats.pathLen/(iterStats.cells||1))*100).toFixed(1)}%</span>`);

  renderFreqGraph();
  updateStatusFreq(freq);
}

function renderFreqGraph(){
  const W2=GRAPH_W,H2=GRAPH_H;
  const hist=freqData.freqHistory;
  if(hist.length<2){fgraph.textContent='loading...';return;}

  // Build ASCII grid
  const grid=Array.from({length:H2},()=>new Array(W2).fill(' '));
  const minF=4,maxF=22,range=maxF-minF;

  // Target line at 13.7Hz
  const targetRow=H2-1-Math.floor((TARGET_FREQ-minF)/range*(H2-1));
  for(let c=0;c<W2;c++) grid[targetRow][c]='─';

  // Plot frequency curve
  for(let i=0;i<Math.min(hist.length,W2);i++){
    const c=W2-Math.min(hist.length,W2)+i;
    const f=hist[i];
    const row=H2-1-Math.floor(clamp((f-minF)/range,0,1)*(H2-1));
    if(row>=0&&row<H2){
      const isNear=Math.abs(f-TARGET_FREQ)<1.5;
      grid[row][c]=isNear?'◆':'•';
      // Fill column below point with dim bars
      for(let r=row+1;r<H2;r++)
        if(grid[r][c]===' ') grid[r][c]='▏';
    }
  }

  // Phase wave overlay (rolling sine at target freq)
  for(let c=0;c<W2;c++){
    const phase=freqData.phaseShift+c*.4;
    const wave=Math.sin(phase)*freqData.resonanceLevel*3;
    const wRow=Math.floor(targetRow+wave);
    if(wRow>=0&&wRow<H2&&grid[wRow][c]===' ') grid[wRow][c]='~';
  }

  // Axis labels
  const label1=`22Hz`;const label2=`13.7`;const label3=` 4Hz`;
  // Left axis
  for(let r=0;r<H2;r++){
    let lbl='    ';
    if(r===0) lbl='22Hz';
    else if(r===targetRow) lbl='13.7';
    else if(r===H2-1) lbl=' 4Hz';
    grid[r].unshift(...lbl.split(''));
  }

  // Render with colors
  let out='';
  const resColor=freqData.resonanceLevel>.7?'\x1b[92m':'\x1b[32m';
  for(let r=0;r<H2;r++){
    let line='';
    for(let c=0;c<grid[r].length;c++){
      const ch=grid[r][c];
      if(ch==='◆') line+=`<span style="color:#00ffaa;text-shadow:0 0 8px #00ffaa">${ch}</span>`;
      else if(ch==='•') line+=`<span style="color:#00cc77">${ch}</span>`;
      else if(ch==='─'&&r===targetRow) line+=`<span style="color:rgba(255,204,0,.5)">${ch}</span>`;
      else if(ch==='~') line+=`<span style="color:rgba(0,255,170,.35)">${ch}</span>`;
      else if(ch==='▏') line+=`<span style="color:rgba(0,100,50,.4)">${ch}</span>`;
      else if(ch>='0'&&ch<='9'||ch==='.'||ch==='H'||ch==='z') line+=`<span style="color:rgba(0,212,255,.45)">${ch}</span>`;
      else line+=`<span style="color:rgba(0,80,50,.6)">${ch}</span>`;
    }
    out+=line+'\n';
  }

  // Bottom info bar
  const n=freqData.freqHistory.length;
  const avg=n?freqData.freqHistory.reduce((a,b)=>a+b,0)/n:0;
  const peak=n?Math.max(...freqData.freqHistory):0;
  const resLabel=freqData.resonanceLevel>.8?'<span style="color:#ff3366;font-weight:700">CONTACT</span>':
    freqData.resonanceLevel>.5?'<span style="color:#ffcc00">APPROACHING</span>':
    '<span style="color:rgba(0,200,100,.6)">SCANNING</span>';

  out+=`<span style="color:rgba(0,212,255,.4)">avg:${avg.toFixed(1)}Hz peak:${peak.toFixed(1)}Hz contact:${freqData.contactAttempts} status:</span>${resLabel}\n`;
  out+=`<span style="color:rgba(0,150,80,.5)">resonance_level:${(freqData.resonanceLevel*100).toFixed(1)}% learning:${(freqData.learningRate*100).toFixed(0)}% iter:${freqData.iterations.length}</span>`;

  fgraph.innerHTML=out;
}

function updateStatusFreq(freq){
  document.getElementById('sb-f').textContent=freq.toFixed(2);
  const sig=freqData.resonanceLevel>.8?'CONTACT':freqData.resonanceLevel>.5?'APPROACH':'SCAN';
  document.getElementById('sb-s').textContent=sig;
  document.getElementById('sb-s').style.color=
    freqData.resonanceLevel>.8?'#ff3366':freqData.resonanceLevel>.5?'#ffcc00':'#00ffaa';
}

let solverGen=null,solution=[],visitedSet=new Set(),pathSet=new Set();
let phase='idle',tick=0,animId=null,revealIdx=0,pauseTick=0;
let solveSpeed=4,iterCount=0;
let iLetters=0,iBacks=0,iTermUpd=0;

function updateSB(){
  document.getElementById('sb-i').textContent=iterCount;
  document.getElementById('sb-c').textContent=visitedSet.size;
  document.getElementById('sb-b').textContent=iBacks;

function nextIteration(){
  iterCount++;
  // NEW MAZE
  computeLayout();
  const built=buildMaze();
  maze=built;entry=[built.er*2+1,0];exit_=[built.xr*2+1,W-1];
  letters=placeLetters(maze.grid);

  visitedSet=new Set();pathSet=new Set();
  currentPath=new Set();currentPathArr=[];
  discoveredMots.clear();pathMots.clear();
  ghostQueue=[];solution=[];revealIdx=0;
  iLetters=0;iBacks=0;iTermUpd=0;

  solverGen=randomSolver(maze.grid);
  phase='exploring';

  rlog(`<span class="tc tb2">∂ ITERATION #${iterCount} — NEW MAZE ${COLS}×${ROWS}</span>`);
  rlog(`<span class="td">  entry:[${entry}] exit:[${exit_}]</span>`);

  // Init freq graph with loading state
  if(iterCount===1){
    freqLog(`<span style="color:#00d4ff;font-weight:700">MN3MIA FREQUENCY ANALYZER ONLINE</span>`);
    freqLog(`<span style="color:rgba(0,180,100,.5)">target=13.7Hz — searching for human resonance pattern</span>`);
    freqLog(`<span style="color:rgba(0,180,100,.4)">algorithm: adaptive frequency learning across maze iterations</span>`);
    freqLog(`<span style="color:rgba(0,180,100,.35)">────────────────────────────────────</span>`);
  }
  updateSB();
}

// LOOP
// ═══════════════════════════════════════════════════════
function loop(){
  animId=requestAnimationFrame(loop);tick++;

  if(phase==='ready'||phase==='idle'){
    if(tick%4===0&&maze) drawMaze(visitedSet,pathSet);updateP();return;
  }

  if(phase==='exploring'){
    let found=false;
    for(let s=0;s<solveSpeed;s++){
      const res=solverGen.next().value;
      if(!res){phase='idle';break;}
      if(res.type==='step'){
        visitedSet=res.vis;currentPath.add(res.pos.toString());currentPathArr.push(res.pos);
        iLetters++;
        checkMotsVis(visitedSet);
        if(Math.random()<.016){const[r,c]=res.pos;sp(c*CELL+CELL/2,r*CELL+CELL/2,(Math.random()-.5)*1.2,-1.2-Math.random(),'#00cc88',14,2);}
      } else if(res.type==='back'){
        currentPath.delete(res.pos.toString());
        if(currentPathArr.length>0) currentPathArr.pop();
        iBacks++;
        if(Math.random()<.055){const[r,c]=res.pos;sp(c*CELL+CELL/2,r*CELL+CELL/2,(Math.random()-.5)*.6,-.35,'#882244',7,1.5);}
      } else if(res.type==='found'){
        solution=res.path;
        checkMotsPath(new Set(solution.map(([r,c])=>`${r},${c}`)));
        const hue=160+rng(70);
        pathHistory.push({cells:new Set(currentPath),a:.1,col:`hsla(${hue},65%,38%,.28)`});
        for(const h of pathHistory) h.a*=.68;
        if(pathHistory.length>4) pathHistory.shift();
        currentPath=new Set();currentPathArr=[];
        phase='revealing';revealIdx=0;
        rlog(`<span class="tg tb2">✓ FOUND</span><span class="td"> iter=${iterCount} cells=${visitedSet.size} backs=${iBacks} path=${solution.length}</span>`);
        rlog(`<span class="to">  path_words: [${[...pathMots].join(',')||'none'}]</span>`);
        found=true;break;
      }
    }
    iTermUpd++;
    if(iTermUpd%70===0&&phase==='exploring'){
      const wl=[...discoveredMots].slice(-2).join(' ');
      rlog(`<span class="td">→ c:${visitedSet.size} b:${iBacks} w:[${wl||'—'}]</span>`);
    }
    if(tick%2===0) drawMaze(visitedSet,pathSet);updateP();updateSB();
    if(window._recActive) compositeFrame();
    return;
  }

  if(phase==='revealing'){
    for(let i=0;i<2;i++){
      if(revealIdx<solution.length){
        const[r,c]=solution[revealIdx];pathSet.add(`${r},${c}`);bust(r,c,'#00ffaa',5);revealIdx++;
      }
    }
    if(revealIdx>=solution.length){phase='post';pauseTick=tick;}
    if(tick%2===0) drawMaze(visitedSet,pathSet);updateP();
    if(window._recActive) compositeFrame();
    return;
  }

  if(phase==='post'){
    if(tick%2===0) drawMaze(visitedSet,pathSet);updateP();
    if(window._recActive) compositeFrame();
    if(tick-pauseTick>55){
      // Run freq analysis for this iteration
      updateFreqAnalyzer({
        cells:visitedSet.size,backs:iBacks,
        pathLen:solution.length,
        wordsOnPath:pathMots.size,
        wordsDiscovered:[...discoveredMots],
      });
      rlog(`<span class="td">freq_analysis complete — iter #${iterCount} done</span>`);
      rlog(`<span class="td">────────────────────────────────────</span>`);
      phase='idle';
      setTimeout(()=>nextIteration(),2500);
    }
    return;
  }
}

let mediaRecorder=null,recordedChunks=[];
const recInd=document.getElementById('recind');

function buildComp(){
  compCanvas=document.createElement('canvas');
  compCanvas.width=appEl.offsetWidth;compCanvas.height=appEl.offsetHeight;
  compCtx=compCanvas.getContext('2d');
  compStream=compCanvas.captureStream(30);
}

function compositeFrame(){
  if(!compCtx) return;
  const aw=appEl.offsetWidth,ah=appEl.offsetHeight;
  if(compCanvas.width!==aw||compCanvas.height!==ah){compCanvas.width=aw;compCanvas.height=ah;}
  compCtx.fillStyle='#00000a';compCtx.fillRect(0,0,aw,ah);
  const ar=appEl.getBoundingClientRect();
  // Maze
  const mr=mc.getBoundingClientRect();
  compCtx.drawImage(mc,mr.left-ar.left,mr.top-ar.top,mc.offsetWidth,mc.offsetHeight);
  compCtx.drawImage(pc,mr.left-ar.left,mr.top-ar.top,pc.offsetWidth,pc.offsetHeight);
  // Scanlines
  compCtx.globalAlpha=.025;
  for(let y=0;y<ah;y+=4){compCtx.fillStyle='rgba(0,212,255,1)';compCtx.fillRect(0,y,aw,1);}
  compCtx.globalAlpha=1;
  // Freq panel bg
  const fr=document.getElementById('ft').getBoundingClientRect();
  compCtx.fillStyle='rgba(0,2,8,.97)';compCtx.fillRect(fr.left-ar.left,fr.top-ar.top,fr.width,fr.height);
  // Draw freq graph text
  const fg=fgraph.textContent;
  const lines=fg.split('\n');
  compCtx.font='7.5px "Share Tech Mono",monospace';compCtx.fillStyle='#00ffaa';
  lines.forEach((l,i)=>compCtx.fillText(l,fr.left-ar.left+5,fr.top-ar.top+12+i*11));
  // Right terminal bg
  const rr=document.getElementById('rp').getBoundingClientRect();
  compCtx.fillStyle='rgba(0,4,12,.95)';compCtx.fillRect(rr.left-ar.left,rr.top-ar.top,rr.width,rr.height);
  compCtx.font='8.5px "Share Tech Mono",monospace';compCtx.fillStyle='#00cc88';
  const rlines=Array.from(rb.children).slice(-20);
  rlines.forEach((d,i)=>compCtx.fillText(d.textContent.slice(0,60),rr.left-ar.left+6,rr.top-ar.top+18+i*13));
}

function startRecording(){
  if(mediaRecorder&&mediaRecorder.state==='recording') return;
  if(!window.MediaRecorder){rlog('<span class="tr">MediaRecorder not supported</span>');return;}
  buildComp();
  const mimes=['video/mp4;codecs=h264','video/mp4;codecs=avc1','video/mp4','video/webm;codecs=h264','video/webm;codecs=vp9','video/webm'];
  let mime='video/webm';
  for(const m of mimes){if(MediaRecorder.isTypeSupported(m)){mime=m;break;}}
  const ext=mime.startsWith('video/mp4')?'mp4':'webm';
  try{
    mediaRecorder=new MediaRecorder(compStream,{mimeType:mime,videoBitsPerSecond:8000000});
    recordedChunks=[];
    mediaRecorder.ondataavailable=e=>{if(e.data?.size>0) recordedChunks.push(e.data)};
    mediaRecorder.onstop=()=>{
      const blob=new Blob(recordedChunks,{type:mime});
      const url=URL.createObjectURL(blob);
      const a=document.createElement('a');a.href=url;a.download=`mn3mia_${Date.now()}.${ext}`;
      document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
      rlog(`<span class="tg">✓ ${ext.toUpperCase()} saved (${(blob.size/1048576).toFixed(1)}MB)</span>`);
    };
    mediaRecorder.start(100);recInd.classList.add('on');window._recActive=true;
    rlog(`<span class="tr tb2">⏺ REC ${mime} — S=stop</span>`);
  } catch(e){rlog(`<span class="tr">REC error: ${e.message}</span>`);}
}

function stopRecording(){
  if(mediaRecorder&&mediaRecorder.state==='recording'){
    mediaRecorder.stop();recInd.classList.remove('on');window._recActive=false;
    rlog('<span class="td">Encoding...</span>');
  }
}

document.addEventListener('keydown',e=>{
  if(e.key==='r'||e.key==='R') startRecording();
  if(e.key==='s'||e.key==='S') stopRecording();
});

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
async function init(){
  computeLayout();
  rebuildTicker();
  // Placeholder maze for boot visual
  const built=buildMaze();
  maze=built;entry=[built.er*2+1,0];exit_=[built.xr*2+1,W-1];
  letters=placeLetters(maze.grid);
  phase='ready';tick=0;
  drawMaze(new Set(),new Set());
  loop();
  renderFreqGraph();
  await bootTerminal();
  nextIteration();
}

window.addEventListener('load',()=>setTimeout(init,80));
</script>
